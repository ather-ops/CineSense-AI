<svg width="100%" viewBox="0 0 680 760" role="img" xmlns="http://www.w3.org/2000/svg">
<title>CineSense AI pipeline architecture</title>
<desc>End-to-end pipeline from raw CSV through cleaning, chunking, embedding, ChromaDB, and semantic retrieval</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .th { font-size: 14px; font-weight: 600; fill: #1a1a2e; }
    .ts { font-size: 12px; font-weight: 400; fill: #4a4a6a; }
    .day { font-size: 11px; font-weight: 500; fill: #999; }
    .arr { stroke: #888; stroke-width: 1.5; fill: none; }
  </style>
</defs>

<!-- STAGE 1: DATA SOURCE -->
<rect x="215" y="20" width="250" height="56" rx="8" fill="#f0efe8" stroke="#c8c7bf" stroke-width="0.5"/>
<text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">netflix_titles.csv</text>
<text class="ts" x="340" y="60" text-anchor="middle" dominant-baseline="central">8,800+ titles — raw source</text>

<line x1="340" y1="76" x2="340" y2="112" class="arr" marker-end="url(#arrow)"/>

<!-- STAGE 2: EDA + CLEANING -->
<rect x="175" y="112" width="330" height="72" rx="8" fill="#e1f5ee" stroke="#5dcaa5" stroke-width="0.5"/>
<text class="th" x="340" y="138" text-anchor="middle" dominant-baseline="central" fill="#085041">Data cleaning and EDA</text>
<text class="ts" x="340" y="158" text-anchor="middle" dominant-baseline="central" fill="#0f6e56">Null filling, type normalization, 5 visual dashboards</text>

<line x1="340" y1="184" x2="340" y2="220" class="arr" marker-end="url(#arrow)"/>

<!-- STAGE 3: FEATURE ENGINEERING -->
<rect x="175" y="220" width="330" height="72" rx="8" fill="#e1f5ee" stroke="#5dcaa5" stroke-width="0.5"/>
<text class="th" x="340" y="246" text-anchor="middle" dominant-baseline="central" fill="#085041">Feature engineering</text>
<text class="ts" x="340" y="266" text-anchor="middle" dominant-baseline="central" fill="#0f6e56">title + director + cast + genres + description</text>

<line x1="340" y1="292" x2="340" y2="328" class="arr" marker-end="url(#arrow)"/>

<!-- STAGE 4: CHUNKING - Day 4 -->
<rect x="155" y="328" width="370" height="88" rx="8" fill="#faeeda" stroke="#ef9f27" stroke-width="0.5"/>
<text class="th" x="340" y="354" text-anchor="middle" dominant-baseline="central" fill="#412402">Document chunking</text>
<text class="ts" x="340" y="374" text-anchor="middle" dominant-baseline="central" fill="#633806">Sentence-boundary split — 400-word target chunks</text>
<text class="ts" x="340" y="392" text-anchor="middle" dominant-baseline="central" fill="#633806">Short docs pass through — chunk_index tracked in metadata</text>

<!-- DAY 4 pill badge -->
<rect x="484" y="322" width="42" height="18" rx="9" fill="#ba7517"/>
<text x="505" y="334" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,sans-serif" font-size="10" font-weight="600" fill="#faeeda">DAY 4</text>

<line x1="340" y1="416" x2="340" y2="452" class="arr" marker-end="url(#arrow)"/>

<!-- STAGE 5: EMBEDDINGS -->
<rect x="175" y="452" width="330" height="72" rx="8" fill="#eeedfe" stroke="#afa9ec" stroke-width="0.5"/>
<text class="th" x="340" y="478" text-anchor="middle" dominant-baseline="central" fill="#26215c">Embedding generation</text>
<text class="ts" x="340" y="498" text-anchor="middle" dominant-baseline="central" fill="#3c3489">all-MiniLM-L6-v2 — 384-dim dense vectors per chunk</text>

<line x1="340" y1="524" x2="340" y2="560" class="arr" marker-end="url(#arrow)"/>

<!-- STAGE 6: CHROMADB -->
<rect x="175" y="560" width="330" height="72" rx="8" fill="#eeedfe" stroke="#afa9ec" stroke-width="0.5"/>
<text class="th" x="340" y="586" text-anchor="middle" dominant-baseline="central" fill="#26215c">ChromaDB vector store</text>
<text class="ts" x="340" y="606" text-anchor="middle" dominant-baseline="central" fill="#3c3489">Batch insert — metadata per chunk (year, rating, genre)</text>

<line x1="340" y1="632" x2="340" y2="668" class="arr" marker-end="url(#arrow)"/>

<!-- STAGE 7: RETRIEVAL -->
<rect x="155" y="668" width="370" height="72" rx="8" fill="#faece7" stroke="#f0997b" stroke-width="0.5"/>
<text class="th" x="340" y="694" text-anchor="middle" dominant-baseline="central" fill="#4a1b0c">Semantic retrieval engine</text>
<text class="ts" x="340" y="714" text-anchor="middle" dominant-baseline="central" fill="#712b13">Query vector + $and filters (genre, year, rating, type)</text>

<!-- Left day labels -->
<text class="day" x="36" y="50" text-anchor="middle" dominant-baseline="central">Day 1</text>
<text class="day" x="36" y="148" text-anchor="middle" dominant-baseline="central">Day 1</text>
<text class="day" x="36" y="256" text-anchor="middle" dominant-baseline="central">Day 2</text>
<text class="day" x="36" y="372" text-anchor="middle" dominant-baseline="central">Day 4</text>
<text class="day" x="36" y="488" text-anchor="middle" dominant-baseline="central">Day 2</text>
<text class="day" x="36" y="596" text-anchor="middle" dominant-baseline="central">Day 2</text>
<text class="day" x="36" y="704" text-anchor="middle" dominant-baseline="central">Day 3</text>
</svg>
