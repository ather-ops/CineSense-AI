<svg width="100%" viewBox="0 0 680 780" role="img" xmlns="http://www.w3.org/2000/svg">
<title>CineSense AI pipeline architecture — Day 5</title>
<desc>Eight-stage pipeline: raw CSV, EDA, feature engineering, sentence chunking, embeddings, ChromaDB, retrieval, search tests</desc>
<defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .th  { font-size: 14px; font-weight: 600; }
    .ts  { font-size: 12px; font-weight: 400; }
    .day { font-size: 10px; font-weight: 500; fill: #8b949e; font-family: 'SFMono-Regular', monospace; }
  </style>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#484f58" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- outer card -->
<rect x="12" y="12" width="656" height="756" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

<!-- header bar -->
<rect x="12" y="12" width="656" height="48" rx="14" fill="#161b22" stroke="none"/>
<rect x="12" y="40" width="656" height="20" fill="#161b22" stroke="none"/>
<rect x="12" y="56" width="656" height="4" fill="#0d1117" stroke="none"/>
<line x1="12" y1="60" x2="668" y2="60" stroke="#30363d" stroke-width="0.5"/>
<circle cx="40" cy="36" r="6" fill="#ff5f57"/>
<circle cx="60" cy="36" r="6" fill="#febc2e"/>
<circle cx="80" cy="36" r="6" fill="#28c840"/>
<text x="340" y="40" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">CineSense AI — pipeline architecture — Day 5</text>

<!-- ── STAGE 1: raw data ── -->
<text x="38" y="100" text-anchor="middle" class="day">DAY 1</text>
<rect x="190" y="82" width="300" height="44" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
<text x="340" y="99" text-anchor="middle" dominant-baseline="central" class="th" fill="#e6edf3">netflix_titles.csv</text>
<text x="340" y="117" text-anchor="middle" dominant-baseline="central" class="ts" fill="#8b949e">8,800+ titles — raw source</text>
<line x1="340" y1="126" x2="340" y2="152" stroke="#484f58" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ── STAGE 2: EDA ── -->
<text x="38" y="182" text-anchor="middle" class="day">DAY 1</text>
<rect x="170" y="154" width="340" height="52" rx="8" fill="#0f2922" stroke="#2ea043" stroke-width="0.5"/>
<text x="340" y="174" text-anchor="middle" dominant-baseline="central" class="th" fill="#3fb950">Data cleaning and EDA</text>
<text x="340" y="194" text-anchor="middle" dominant-baseline="central" class="ts" fill="#2ea043">Null handling, normalization, 5 visual dashboards</text>
<line x1="340" y1="206" x2="340" y2="232" stroke="#484f58" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ── STAGE 3: feature engineering ── -->
<text x="38" y="260" text-anchor="middle" class="day">DAY 2</text>
<rect x="170" y="234" width="340" height="52" rx="8" fill="#0f2922" stroke="#2ea043" stroke-width="0.5"/>
<text x="340" y="254" text-anchor="middle" dominant-baseline="central" class="th" fill="#3fb950">Feature engineering</text>
<text x="340" y="274" text-anchor="middle" dominant-baseline="central" class="ts" fill="#2ea043">title + director + cast + genres + description</text>
<line x1="340" y1="286" x2="340" y2="312" stroke="#484f58" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ── STAGE 4: sentence chunking (Day 5 — highlighted) ── -->
<text x="38" y="344" text-anchor="middle" class="day">DAY 5</text>
<rect x="148" y="314" width="384" height="68" rx="8" fill="#1a2a1a" stroke="#3fb950" stroke-width="1.2"/>
<text x="340" y="338" text-anchor="middle" dominant-baseline="central" class="th" fill="#56d364">Sentence-level chunking</text>
<text x="340" y="358" text-anchor="middle" dominant-baseline="central" class="ts" fill="#3fb950">sent_tokenize — 2-sentence chunks, chunk_index + total_chunks</text>
<text x="340" y="374" text-anchor="middle" dominant-baseline="central" class="ts" fill="#2ea043">IDs: show_id_chunk_N — deduplication in retrieval layer</text>
<!-- DAY 5 pill -->
<rect x="492" y="306" width="46" height="16" rx="8" fill="#238636"/>
<text x="515" y="317" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#aff5b4">DAY 5</text>
<line x1="340" y1="382" x2="340" y2="408" stroke="#484f58" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ── STAGE 5: embeddings ── -->
<text x="38" y="436" text-anchor="middle" class="day">DAY 2</text>
<rect x="170" y="410" width="340" height="52" rx="8" fill="#1a1a3a" stroke="#534ab7" stroke-width="0.5"/>
<text x="340" y="430" text-anchor="middle" dominant-baseline="central" class="th" fill="#a5a0f0">Embedding generation</text>
<text x="340" y="450" text-anchor="middle" dominant-baseline="central" class="ts" fill="#7f77dd">all-MiniLM-L6-v2 — 384-dim dense vectors per chunk</text>
<line x1="340" y1="462" x2="340" y2="488" stroke="#484f58" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ── STAGE 6: ChromaDB ── -->
<text x="38" y="516" text-anchor="middle" class="day">DAY 2</text>
<rect x="170" y="490" width="340" height="52" rx="8" fill="#1a1a3a" stroke="#534ab7" stroke-width="0.5"/>
<text x="340" y="510" text-anchor="middle" dominant-baseline="central" class="th" fill="#a5a0f0">ChromaDB vector store</text>
<text x="340" y="530" text-anchor="middle" dominant-baseline="central" class="ts" fill="#7f77dd">Batch insert — metadata per chunk (year, rating, genre)</text>
<line x1="340" y1="542" x2="340" y2="568" stroke="#484f58" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ── STAGE 7: retrieval ── -->
<text x="38" y="596" text-anchor="middle" class="day">DAY 3</text>
<rect x="148" y="570" width="384" height="52" rx="8" fill="#2a0f0f" stroke="#da3633" stroke-width="0.5"/>
<text x="340" y="590" text-anchor="middle" dominant-baseline="central" class="th" fill="#f85149">Semantic retrieval engine</text>
<text x="340" y="610" text-anchor="middle" dominant-baseline="central" class="ts" fill="#b22222">Query vector + $and filters: genre, year, rating, type</text>
<line x1="340" y1="622" x2="340" y2="648" stroke="#484f58" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ── STAGE 8: deduplicated output ── -->
<text x="38" y="676" text-anchor="middle" class="day">DAY 5</text>
<rect x="170" y="650" width="340" height="52" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
<text x="340" y="670" text-anchor="middle" dominant-baseline="central" class="th" fill="#e6edf3">Deduplicated ranked results</text>
<text x="340" y="690" text-anchor="middle" dominant-baseline="central" class="ts" fill="#8b949e">Unique titles — matching chunk preview — CSV export</text>

