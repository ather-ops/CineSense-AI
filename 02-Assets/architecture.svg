<text x="246" y="739" class="ts" fill="#8b949e">Chunking (Day 5)</text>
<rect x="360" y="730" width="10" height="10" rx="2" fill="#1a1a3a" stroke="#534ab7" stroke-width="0.5"/>
<text x="376" y="739" class="ts" fill="#8b949e">ML layer</text>
<rect x="450" y="730" width="10" height="10" rx="2" fill="#2a0f0f" stroke="#da3633" stroke-width="0.5"/>
<text x="466" y="739" class="ts" fill="#8b949e">Retrieval</text>

