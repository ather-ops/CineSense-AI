<text x="224" y="206" class="dim" fill="#484f58">banners, diagrams, screenshots</text>

<!-- ── 03-Core ── -->
<line x1="68" y1="242" x2="92" y2="242" stroke="#30363d" stroke-width="1"/>
<rect x="96" y="230" width="108" height="24" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
