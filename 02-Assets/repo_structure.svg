<line x1="114" y1="254" x2="114" y2="320" stroke="#21262d" stroke-width="1"/>

<line x1="114" y1="266" x2="132" y2="266" stroke="#21262d" stroke-width="1"/>
<text x="138" y="271" class="mono-sm" fill="#8b949e">pipeline.py</text>
<rect x="232" y="258" width="242" height="17" rx="8" fill="#1a1a3a" stroke="#534ab7" stroke-width="0.5"/>
<text x="353" y="269" text-anchor="middle" class="tag" fill="#a5a0f0">ingestion → chunking → embeddings → ChromaDB</text>

<line x1="114" y1="288" x2="132" y2="288" stroke="#21262d" stroke-width="1"/>
<text x="138" y="293" class="mono-sm" fill="#8b949e">rag_engine.py</text>
<rect x="248" y="280" width="198" height="17" rx="8" fill="#1a1228" stroke="#8957e5" stroke-width="0.5"/>
<text x="347" y="291" text-anchor="middle" class="tag" fill="#d2a8ff">retrieval + Gemini 2.5 Flash</text>

<line x1="114" y1="310" x2="132" y2="310" stroke="#21262d" stroke-width="1"/>
<text x="138" y="315" class="mono-sm" fill="#8b949e">app.py</text>
<rect x="196" y="302" width="178" height="17" rx="8" fill="#1f2d1f" stroke="#3fb950" stroke-width="0.5"/>
<text x="285" y="313" text-anchor="middle" class="tag" fill="#3fb950">Streamlit UI — MVP live</text>
<!-- LIVE pill -->
<rect x="384" y="302" width="40" height="17" rx="8" fill="#238636"/>
<text x="404" y="313" text-anchor="middle" class="tag" fill="#aff5b4">LIVE</text>

<!-- ── 04-Visuals ── -->
<line x1="68" y1="348" x2="92" y2="348" stroke="#30363d" stroke-width="1"/>
<rect x="96" y="336" width="124" height="24" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
<text x="108" y="352" class="mono-sm" font-weight="600" fill="#79c0ff">04-Visuals/</text>
<text x="228" y="352" class="dim" fill="#484f58">5 EDA charts — PNG exports</text>

<!-- ── 05-chroma_data ── -->
<line x1="68" y1="390" x2="92" y2="390" stroke="#30363d" stroke-width="1"/>
<rect x="96" y="378" width="148" height="24" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
<text x="108" y="394" class="mono-sm" font-weight="600" fill="#79c0ff">chroma_data/</text>
<rect x="254" y="380" width="160" height="17" rx="8" fill="#1a1a3a" stroke="#534ab7" stroke-width="0.5"/>
<text x="334" y="391" text-anchor="middle" class="tag" fill="#a5a0f0">persisted vector store</text>

<!-- ── requirements.txt ── -->
<line x1="68" y1="428" x2="92" y2="428" stroke="#30363d" stroke-width="1"/>
<text x="96" y="433" class="mono-sm" font-weight="600" fill="#e6edf3">requirements.txt</text>
<rect x="246" y="420" width="94" height="17" rx="8" fill="#161b22" stroke="#484f58" stroke-width="0.5"/>
<text x="293" y="431" text-anchor="middle" class="tag" fill="#8b949e">dependencies</text>

<!-- ── .env.example ── -->
<line x1="68" y1="466" x2="92" y2="466" stroke="#30363d" stroke-width="1"/>
<text x="96" y="471" class="mono-sm" font-weight="600" fill="#e6edf3">.env.example</text>
<rect x="214" y="458" width="150" height="17" rx="8" fill="#2a1f0a" stroke="#9e6a03" stroke-width="0.5"/>
<text x="289" y="469" text-anchor="middle" class="tag" fill="#e3b341">GEMINI_API_KEY template</text>

<!-- footer -->
<line x1="32" y1="494" x2="648" y2="494" stroke="#30363d" stroke-width="0.5"/>
<text x="340" y="514" text-anchor="middle" font-family="'SFMono-Regular',monospace" font-size="11" fill="#484f58">github.com/ather-ops/CineSense-AI</text>

<!-- legend -->
<rect x="138" y="522" width="10" height="10" rx="2" fill="#2a0f0f" stroke="#da3633" stroke-width="0.5"/>
<text x="154" y="531" class="dim" fill="#8b949e">raw data</text>
<rect x="220" y="522" width="10" height="10" rx="2" fill="#1a1a3a" stroke="#534ab7" stroke-width="0.5"/>
<text x="236" y="531" class="dim" fill="#8b949e">pipeline</text>
<rect x="304" y="522" width="10" height="10" rx="2" fill="#1a1228" stroke="#8957e5" stroke-width="0.5"/>
<text x="320" y="531" class="dim" fill="#8b949e">LLM</text>
<rect x="372" y="522" width="10" height="10" rx="2" fill="#1f2d1f" stroke="#3fb950" stroke-width="0.5"/>
<text x="388" y="531" class="dim" fill="#8b949e">UI / live</text>
<rect x="450" y="522" width="10" height="10" rx="2" fill="#2a1f0a" stroke="#9e6a03" stroke-width="0.5"/>
<text x="466" y="531" class="dim" fill="#8b949e">config</text>
