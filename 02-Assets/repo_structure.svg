<svg width="100%" viewBox="0 0 680 560" role="img" xmlns="http://www.w3.org/2000/svg">
<title>CineSense AI repository structure</title>
<defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .mono   { font-family: 'SFMono-Regular','Consolas','Liberation Mono',monospace; font-size:13px; }
    .mono-sm{ font-family: 'SFMono-Regular','Consolas','Liberation Mono',monospace; font-size:12px; }
    .tag    { font-family: 'SFMono-Regular',monospace; font-size:10px; font-weight:700; }
    .dim    { font-family: 'SFMono-Regular',monospace; font-size:11px; }
  </style>
</defs>

<!-- card -->
<rect x="12" y="12" width="656" height="536" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
<!-- header -->
<rect x="12" y="12" width="656" height="48" rx="14" fill="#161b22"/>
<rect x="12" y="40" width="656" height="24" fill="#161b22"/>
<line x1="12" y1="60" x2="668" y2="60" stroke="#30363d" stroke-width="0.5"/>
<circle cx="40" cy="36" r="6" fill="#ff5f57"/>
<circle cx="60" cy="36" r="6" fill="#febc2e"/>
<circle cx="80" cy="36" r="6" fill="#28c840"/>
<text x="340" y="40" text-anchor="middle" font-family="'SFMono-Regular',monospace" font-size="11" fill="#8b949e">CineSense-AI — repository structure</text>

<!-- ROOT -->
<text x="56" y="96" class="mono" font-weight="700" fill="#e6edf3">CineSense-AI/</text>
<!-- trunk -->
<line x1="68" y1="106" x2="68" y2="466" stroke="#30363d" stroke-width="1"/>

<!-- ── 01-Data ── -->
<line x1="68" y1="126" x2="92" y2="126" stroke="#30363d" stroke-width="1"/>
<rect x="96" y="114" width="110" height="24" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
<text x="108" y="130" class="mono-sm" font-weight="600" fill="#79c0ff">01-Data/</text>
<line x1="114" y1="138" x2="114" y2="174" stroke="#21262d" stroke-width="1"/>
<line x1="114" y1="150" x2="132" y2="150" stroke="#21262d" stroke-width="1"/>
<text x="138" y="155" class="mono-sm" fill="#8b949e">netflix_titles.csv</text>
<rect x="302" y="142" width="68" height="17" rx="8" fill="#2a0f0f" stroke="#da3633" stroke-width="0.5"/>
<text x="336" y="153" text-anchor="middle" class="tag" fill="#f85149">raw</text>
<line x1="114" y1="168" x2="132" y2="168" stroke="#21262d" stroke-width="1"/>
<text x="138" y="173" class="mono-sm" fill="#8b949e">netflix_titles_clean.csv</text>
<rect x="338" y="161" width="56" height="17" rx="8" fill="#0f2922" stroke="#2ea043" stroke-width="0.5"/>
